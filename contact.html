<section class="max-w-2xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-bold mb-6">Contact Us</h1>

  <form class="space-y-4">
    <input type="text" placeholder="Name" class="w-full border p-3 rounded" required />
    <input type="email" placeholder="Email" class="w-full border p-3 rounded" required />
    <textarea placeholder="Message" class="w-full border p-3 rounded" rows="5"></textarea>

    <button class="bg-blue-500 text-white px-6 py-3 rounded">
      Send Message
    </button>
  </form>
</section>
